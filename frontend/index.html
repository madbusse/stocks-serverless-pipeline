<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Top Movers - 7 Day History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Courier New', Courier, monospace;
            background: #000;
            color: #0f0;
            padding: 40px;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://st4.depositphotos.com/12659858/23908/i/450/depositphotos_239087274-stock-photo-rendering-stock-indexes-virtual-space.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.5; /* 50% Opacity */
            z-index: -1; /* Puts it behind your table and text */
        }
        h1 {
            color: #0f0;
            margin-bottom: 10px;
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #333;
        }
        th {
            background: #111;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            color: #0f0;
            border: 1px solid #333;
        }
        td {
            padding: 12px;
            border: 1px solid #333;
            color: #fff;
        }
        tr:hover { background: #111; }
        .positive { color: #0f0; font-weight: bold; }
        .negative { color: #f00; font-weight: bold; }
        .ticker { font-weight: bold; color: #fff; }
        .loading {
            padding: 40px;
            color: #888;
        }
        .error {
            background: #300;
            color: #f00;
            padding: 12px;
            border: 1px solid #f00;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>STOCK TOP MOVERS</h1>
    <p class="subtitle">7-Day History of Daily Top Movers</p>
    <div id="content">
        <div class="loading">Loading data...</div>
    </div>

    <script>
        const API_ENDPOINT = 'API_ENDPOINT_PLACEHOLDER';

        async function fetchMovers() {
            try {
                const response = await fetch(`${API_ENDPOINT}/movers`);
                if (!response.ok) throw new Error('Failed to fetch data');
                const data = await response.json();
                displayMovers(data);
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    `<div class="error">Error loading data: ${error.message}</div>`;
            }
        }

        function displayMovers(movers) {
            if (!movers || movers.length === 0) {
                document.getElementById('content').innerHTML = 
                    '<div class="loading">No data available</div>';
                return;
            }

            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>DATE</th>
                            <th>TICKER</th>
                            <th>% CHANGE</th>
                            <th>CLOSING PRICE</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${movers.map(m => `
                            <tr>
                                <td>${m.date}</td>
                                <td class="ticker">${m.ticker}</td>
                                <td class="${m.percentChange >= 0 ? 'positive' : 'negative'}">
                                    ${m.percentChange >= 0 ? '+' : ''}${m.percentChange}%
                                </td>
                                <td>$${m.closingPrice.toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('content').innerHTML = table;
        }

        fetchMovers();
    </script>
</body>
</html>
