<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Top Movers - 7 Day History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #495057;
            border-bottom: 2px solid #dee2e6;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
        }
        tr:hover { background: #f8f9fa; }
        .positive { color: #28a745; font-weight: 600; }
        .negative { color: #dc3545; font-weight: 600; }
        .ticker { font-weight: 600; color: #495057; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Stock Top Movers</h1>
        <p class="subtitle">7-Day History of Daily Top Movers</p>
        <div id="content">
            <div class="loading">Loading data...</div>
        </div>
    </div>

    <script>
        const API_ENDPOINT = 'API_ENDPOINT_PLACEHOLDER';

        async function fetchMovers() {
            try {
                const response = await fetch(`${API_ENDPOINT}/movers`);
                if (!response.ok) throw new Error('Failed to fetch data');
                const data = await response.json();
                displayMovers(data);
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    `<div class="error">Error loading data: ${error.message}</div>`;
            }
        }

        function displayMovers(movers) {
            if (!movers || movers.length === 0) {
                document.getElementById('content').innerHTML = 
                    '<div class="loading">No data available</div>';
                return;
            }

            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Ticker</th>
                            <th>% Change</th>
                            <th>Closing Price</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${movers.map(m => `
                            <tr>
                                <td>${m.date}</td>
                                <td class="ticker">${m.ticker}</td>
                                <td class="${m.percentChange >= 0 ? 'positive' : 'negative'}">
                                    ${m.percentChange >= 0 ? '+' : ''}${m.percentChange}%
                                </td>
                                <td>$${m.closingPrice.toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('content').innerHTML = table;
        }

        fetchMovers();
    </script>
</body>
</html>
