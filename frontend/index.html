<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Top Movers - 7 Day History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Courier New', Courier, monospace;
            background: #000;
            color: #0f0;
            padding: 40px;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://st4.depositphotos.com/12659858/23908/i/450/depositphotos_239087274-stock-photo-rendering-stock-indexes-virtual-space.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.5;
            z-index: -1;
        }
        h1 {
            color: #0f0;
            margin-bottom: 10px;
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .volatile-stock {
            color: #ff0;
            margin-bottom: 30px;
            font-size: 16px;
            font-weight: bold;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #0c0;
        }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #333;
        }
        th {
            background: #111;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            color: #0f0;
            border: 1px solid #333;
        }
        td {
            padding: 12px;
            border: 1px solid #333;
            color: #fff;
        }
        tr:hover { background: #111; }
        .positive { color: #0f0; font-weight: bold; }
        .negative { color: #f00; font-weight: bold; }
        .ticker { font-weight: bold; color: #fff; }
        .loading {
            padding: 40px;
            color: #888;
        }
        .error {
            background: #300;
            color: #f00;
            padding: 12px;
            border: 1px solid #f00;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>STOCK TOP MOVERS</h1>
    <p class="subtitle">Historical Daily Top Movers</p>
    <div class="volatile-stock" id="volatileStock"></div>
    <div class="controls">
        <button id="show7Days" disabled>Show 7 Days</button>
        <button id="show30Days">Show 30 Days</button>
    </div>
    <div id="content">
        <div class="loading">Loading data...</div>
    </div>

    <script>
        const API_ENDPOINT = 'API_ENDPOINT_PLACEHOLDER';
        let allData = [];
        let currentView = 7;

        async function fetchMovers() {
            try {
                const response = await fetch(`${API_ENDPOINT}/movers`);
                if (!response.ok) throw new Error('Failed to fetch data');
                allData = await response.json();
                displayMovers(7);
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    `<div class="error">Error loading data: ${error.message}</div>`;
            }
        }

        function calculateMostVolatile(days) {
            const dataToAnalyze = allData.slice(0, days);
            const tickerCount = {};
            
            dataToAnalyze.forEach(item => {
                tickerCount[item.ticker] = (tickerCount[item.ticker] || 0) + 1;
            });
            
            let mostVolatile = '';
            let maxCount = 0;
            
            for (const [ticker, count] of Object.entries(tickerCount)) {
                if (count > maxCount) {
                    maxCount = count;
                    mostVolatile = ticker;
                }
            }
            
            return { ticker: mostVolatile, count: maxCount };
        }

        function displayMovers(days) {
            currentView = days;
            
            // Update buttons
            document.getElementById('show7Days').disabled = (days === 7);
            document.getElementById('show30Days').disabled = (days === 30);
            
            if (!allData || allData.length === 0) {
                document.getElementById('content').innerHTML = 
                    '<div class="loading">No data available</div>';
                return;
            }

            const movers = allData.slice(0, days);
            const volatile = calculateMostVolatile(days);
            
            // Display most volatile stock
            document.getElementById('volatileStock').innerHTML = 
                `Most volatile over the past ${days} days: <span style="color: #ff0;">${volatile.ticker}</span> (${volatile.count} appearances)`;

            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>DATE</th>
                            <th>TICKER</th>
                            <th>% CHANGE</th>
                            <th>CLOSING PRICE</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${movers.map(m => `
                            <tr>
                                <td>${m.date}</td>
                                <td class="ticker">${m.ticker}</td>
                                <td class="${m.percentChange >= 0 ? 'positive' : 'negative'}">
                                    ${m.percentChange >= 0 ? '+' : ''}${m.percentChange}%
                                </td>
                                <td>$${m.closingPrice.toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('content').innerHTML = table;
        }

        // Event listeners
        document.getElementById('show7Days').addEventListener('click', () => displayMovers(7));
        document.getElementById('show30Days').addEventListener('click', () => displayMovers(30));

        fetchMovers();
    </script>
</body>
</html>
